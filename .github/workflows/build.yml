name: Build APKs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish the five APKs as a GitHub Release
        required: true
        default: false
        type: boolean
      release_tag:
        description: Optional release tag (defaults to v<version>-<run number>)
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-37.0" "build-tools;37.0.0"
          if [[ ! -e "$ANDROID_HOME/platforms/android-37" ]]; then
            ln -s "$ANDROID_HOME/platforms/android-37.0" "$ANDROID_HOME/platforms/android-37"
          fi

      - name: Build optimized release variants
        run: |
          ./gradlew --no-daemon \
            :app:assembleUniversalRelease \
            :app:assembleArm64Release \
            :app:assembleArm32Release \
            :app:assembleX86Release \
            :app:assembleX86_64Release

      - name: Configure APK signing
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD_SECRET: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS_SECRET: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD_SECRET: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          keystore="$RUNNER_TEMP/boot-patcher-release.jks"
          if [[ -n "$RELEASE_KEYSTORE_BASE64" ]]; then
            : "${RELEASE_KEYSTORE_PASSWORD_SECRET:?RELEASE_KEYSTORE_PASSWORD is required}"
            : "${RELEASE_KEY_ALIAS_SECRET:?RELEASE_KEY_ALIAS is required}"
            : "${RELEASE_KEY_PASSWORD_SECRET:?RELEASE_KEY_PASSWORD is required}"
            printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore"
            keystore_password="$RELEASE_KEYSTORE_PASSWORD_SECRET"
            key_alias="$RELEASE_KEY_ALIAS_SECRET"
            key_password="$RELEASE_KEY_PASSWORD_SECRET"
          else
            keystore_password="$(openssl rand -hex 24)"
            key_alias="boot-patcher-ci"
            key_password="$keystore_password"
            keytool -genkeypair \
              -keystore "$keystore" \
              -storepass "$keystore_password" \
              -alias "$key_alias" \
              -keypass "$key_password" \
              -keyalg RSA \
              -keysize 4096 \
              -validity 3650 \
              -dname "CN=Boot Patcher CI, O=Boot Patcher, C=CN"
          fi

          echo "::add-mask::$keystore_password"
          echo "::add-mask::$key_password"
          {
            echo "APK_KEYSTORE=$keystore"
            echo "APK_KEYSTORE_PASSWORD=$keystore_password"
            echo "APK_KEY_ALIAS=$key_alias"
            echo "APK_KEY_PASSWORD=$key_password"
          } >> "$GITHUB_ENV"

      - name: Align, sign, and hash APKs
        run: |
          set -euo pipefail

          build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -1)"
          zipalign="$build_tools/zipalign"
          apksigner="$build_tools/apksigner"
          mkdir -p dist

          variants=(universal arm64 arm32 x86 x86-64)
          inputs=(
            app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
            app/build/outputs/apk/arm64/release/app-arm64-release-unsigned.apk
            app/build/outputs/apk/arm32/release/app-arm32-release-unsigned.apk
            app/build/outputs/apk/x86/release/app-x86-release-unsigned.apk
            app/build/outputs/apk/x86_64/release/app-x86_64-release-unsigned.apk
          )

          for index in "${!variants[@]}"; do
            variant="${variants[$index]}"
            input="${inputs[$index]}"
            aligned="$RUNNER_TEMP/Boot-Patcher-$variant-aligned.apk"
            output="dist/Boot-Patcher-$variant.apk"

            "$zipalign" -P 16 -f 4 "$input" "$aligned"
            "$apksigner" sign \
              --ks "$APK_KEYSTORE" \
              --ks-pass "env:APK_KEYSTORE_PASSWORD" \
              --ks-key-alias "$APK_KEY_ALIAS" \
              --key-pass "env:APK_KEY_PASSWORD" \
              --out "$output" \
              "$aligned"
            "$apksigner" verify --verbose "$output"
            "$zipalign" -P 16 -c 4 "$output"
          done

          (
            cd dist
            sha256sum Boot-Patcher-*.apk | sort -k2 > SHA256SUMS.txt
          )

          {
            echo "## APK SHA-256"
            echo
            echo "| Variant | APK | SHA-256 |"
            echo "| --- | --- | --- |"
            while read -r hash file; do
              variant="${file#Boot-Patcher-}"
              variant="${variant%.apk}"
              echo "| $variant | \`$file\` | \`$hash\` |"
            done < dist/SHA256SUMS.txt
          } > dist/RELEASE_NOTES.md

          cat dist/RELEASE_NOTES.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: Boot-Patcher-universal
          path: dist/Boot-Patcher-universal.apk
          compression-level: 0
          if-no-files-found: error

      - name: Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: Boot-Patcher-arm64
          path: dist/Boot-Patcher-arm64.apk
          compression-level: 0
          if-no-files-found: error

      - name: Upload arm32 APK
        uses: actions/upload-artifact@v4
        with:
          name: Boot-Patcher-arm32
          path: dist/Boot-Patcher-arm32.apk
          compression-level: 0
          if-no-files-found: error

      - name: Upload x86 APK
        uses: actions/upload-artifact@v4
        with:
          name: Boot-Patcher-x86
          path: dist/Boot-Patcher-x86.apk
          compression-level: 0
          if-no-files-found: error

      - name: Upload x86-64 APK
        uses: actions/upload-artifact@v4
        with:
          name: Boot-Patcher-x86-64
          path: dist/Boot-Patcher-x86-64.apk
          compression-level: 0
          if-no-files-found: error

      - name: Select release tag
        if: github.event_name == 'workflow_dispatch' && inputs.publish_release
        env:
          REQUESTED_TAG: ${{ inputs.release_tag }}
        run: |
          version="$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts | head -1)"
          tag="${REQUESTED_TAG:-v${version}-${GITHUB_RUN_NUMBER}}"
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        if: github.event_name == 'workflow_dispatch' && inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Boot Patcher ${{ env.RELEASE_TAG }}
          body_path: dist/RELEASE_NOTES.md
          files: |
            dist/Boot-Patcher-universal.apk
            dist/Boot-Patcher-arm64.apk
            dist/Boot-Patcher-arm32.apk
            dist/Boot-Patcher-x86.apk
            dist/Boot-Patcher-x86-64.apk
          fail_on_unmatched_files: true
